<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Catalog — HonorVet LMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark" id="logo-letter">HV</div>
      <div class="logo-text-wrap">
        <div class="logo-text" id="app-name">HonorVet LMS</div>
        <div class="logo-sub">Learning Platform</div>
      </div>
    </div>
    <nav class="nav-section"><div class="nav-label">Menu</div><div id="nav-links"></div></nav>
    <div class="sidebar-footer"><div class="user-chip" id="user-chip"></div></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div>
        <div class="topbar-title">Course Catalog</div>
        <div class="topbar-sub">Browse and enroll in available training</div>
      </div>
      <div class="topbar-actions" style="display:flex;align-items:center;gap:12px">
        <div class="topbar-search">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="search" id="search" placeholder="Search courses…">
        </div>
        <div id="notif-bell-wrap"></div>
      </div>
    </header>

    <div class="page">
      <!-- Category chips -->
      <div class="chip-row" id="chip-row"></div>

      <div id="mandatory-section" style="margin-bottom:28px;display:none">
        <div class="section-head"><div class="section-title">⚠️ Mandatory Training</div></div>
        <div class="course-grid" id="mandatory-grid"></div>
      </div>

      <div class="section-head">
        <div class="section-title">All Courses</div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <span id="course-count" style="font-size:13px;color:var(--text-muted)"></span>
          <select class="mini-select" id="filter-status">
            <option value="">All statuses</option>
            <option value="not_enrolled">Not enrolled</option>
            <option value="not_started">Not started</option>
            <option value="in_progress">In progress</option>
            <option value="completed">Completed</option>
          </select>
          <select class="mini-select" id="sort-by">
            <option value="newest">Newest</option>
            <option value="az">A–Z</option>
            <option value="duration">Shortest</option>
          </select>
        </div>
      </div>
      <div id="courses-area"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById('logo-letter').textContent = APP_CONFIG.logoLetter;
document.getElementById('app-name').textContent = APP_CONFIG.appName;

let allCourses = [], myEnrollments = [], currentUser = null, currentTag = '';

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;
  renderNav('catalog', currentUser);
  renderNotifBell(currentUser.id, 'notif-bell-wrap');
  renderUserChip(currentUser);

  [allCourses, myEnrollments] = await Promise.all([
    Courses.getAll(),
    Enrollments.getMine(currentUser.id),
  ]);

  // Deep-link params: ?q=search  ?tag=Category
  const urlParams = new URLSearchParams(location.search);
  const urlQ   = urlParams.get('q')   || '';
  const urlTag = urlParams.get('tag') || '';
  if (urlQ) document.getElementById('search').value = urlQ;

  // Build category chips from tags
  const tags = [...new Set(allCourses.flatMap(c => c.tags || []))].sort();
  const startTag = tags.includes(urlTag) ? urlTag : '';
  currentTag = startTag;
  const row = document.getElementById('chip-row');
  row.innerHTML = [['', 'All'], ...tags.map(t => [t, t])]
    .map(([val, label]) => `<button class="fchip${val === startTag ? ' active' : ''}" data-tag="${val}">${label}</button>`)
    .join('');
  row.querySelectorAll('.fchip').forEach(chip => {
    chip.onclick = () => {
      row.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      currentTag = chip.dataset.tag;
      renderAll();
    };
  });

  renderAll();
  document.getElementById('search').oninput = renderAll;
  document.getElementById('filter-status').onchange = renderAll;
  document.getElementById('sort-by').onchange = renderAll;
})();

function getEnrollment(courseId) {
  return myEnrollments.find(e => e.course_id === courseId);
}

function renderAll() {
  const q      = document.getElementById('search').value.toLowerCase();
  const tag    = currentTag;
  const status = document.getElementById('filter-status').value;
  const sort   = document.getElementById('sort-by').value;

  let filtered = allCourses.filter(c => {
    const matchQ   = !q   || c.title.toLowerCase().includes(q) || (c.description||'').toLowerCase().includes(q);
    const matchTag = !tag || (c.tags||[]).includes(tag);
    let matchStatus = true;
    if (status) {
      const s = getEnrollment(c.id)?.status || 'not_enrolled';
      matchStatus = s === status;
    }
    return matchQ && matchTag && matchStatus;
  });

  filtered = filtered.slice().sort((a, b) => {
    if (sort === 'az')       return (a.title || '').localeCompare(b.title || '');
    if (sort === 'duration') return (a.duration_minutes || 0) - (b.duration_minutes || 0);
    return new Date(b.created_at || 0) - new Date(a.created_at || 0); // newest
  });

  document.getElementById('course-count').textContent = `${filtered.length} course${filtered.length !== 1 ? 's' : ''}`;

  const mandatory = filtered.filter(c => c.is_mandatory);
  const mandSec   = document.getElementById('mandatory-section');
  if (mandatory.length && !q && !tag && !status) {
    mandSec.style.display = '';
    document.getElementById('mandatory-grid').innerHTML = mandatory.map(c => courseCard(c)).join('');
  } else {
    mandSec.style.display = 'none';
  }

  const area = document.getElementById('courses-area');
  if (filtered.length === 0) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><strong>No courses match your search</strong><p>Try a different keyword or category.</p></div>`;
  } else {
    area.innerHTML = `<div class="course-grid">${filtered.map(c => courseCard(c)).join('')}</div>`;
  }
}

function courseCard(course) {
  const enr    = getEnrollment(course.id);
  const status = enr?.status || 'not_enrolled';
  const actionLabel = status === 'completed' ? 'Review' : status === 'in_progress' ? 'Continue' : status === 'not_started' ? 'Start' : 'Enroll';
  const actionClass = status === 'not_enrolled' ? 'btn-secondary' : 'btn-primary';

  return courseCardHTML(course, {
    enrollment: enr,
    status,
    actionHTML: `<button class="btn ${actionClass} btn-sm" onclick="handleAction('${course.id}', '${status}')">${actionLabel}</button>`,
  });
}

async function handleAction(courseId, status) {
  if (status === 'not_enrolled') {
    try {
      await Enrollments.enroll(currentUser.id, courseId);
      myEnrollments = await Enrollments.getMine(currentUser.id);
      renderAll();
      toast('Enrolled! Starting your course…', 'success');
      setTimeout(() => window.location.href = `course.html?id=${courseId}`, 800);
    } catch(e) { toast(e.message, 'error'); }
  } else {
    window.location.href = `course.html?id=${courseId}`;
  }
}
</script>
</body>
</html>
