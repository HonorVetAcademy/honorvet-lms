<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course — HonorVet LMS</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark" id="logo-letter">HV</div>
      <div class="logo-text-wrap">
        <div class="logo-text" id="app-name">HonorVet LMS</div>
        <div class="logo-sub">Learning Platform</div>
      </div>
    </div>
    <nav class="nav-section"><div class="nav-label">Menu</div><div id="nav-links"></div></nav>
    <div class="sidebar-footer"><div class="user-chip" id="user-chip"></div></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <a href="catalog.html" class="btn btn-secondary btn-sm">← Back to catalog</a>
      </div>
      <div id="notif-bell-wrap"></div>
    </header>

    <div class="page">
      <!-- Course hero banner -->
      <div class="course-hero" id="course-hero">
        <div class="course-hero-eyebrow" id="ch-cat">Training</div>
        <h1 class="course-hero-title" id="course-title">Loading…</h1>
        <div class="course-hero-meta" id="course-meta"></div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start" id="layout">
        <div>
          <div class="player-wrap" id="player-wrap">
            <div class="spinner"></div>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:16px">
          <!-- Progress card -->
          <div class="card card-body" id="progress-card">
            <div class="card-title">Your Progress</div>
            <div style="margin:12px 0">
              <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:6px" id="progress-label">Not started</div>
            </div>

            <!-- Tracking gate (shown while unlocking) -->
            <div id="tracking-gate" style="display:none;margin-bottom:14px">
              <div id="tracking-msg" style="font-size:12.5px;color:var(--text-muted);margin-bottom:8px"></div>
              <div id="time-gate-wrap" style="display:none">
                <div class="progress-bar" style="height:6px;margin-bottom:4px">
                  <div id="time-bar" class="progress-fill" style="width:0%;background:var(--brand)"></div>
                </div>
                <div id="time-label" style="font-size:11.5px;color:var(--text-dim)"></div>
              </div>
              <div id="ack-wrap" style="display:none;margin-top:4px">
                <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:13px">
                  <input type="checkbox" id="ack-checkbox" style="margin-top:2px;accent-color:var(--brand)" onchange="onAckChange()">
                  I confirm I have completed this course content.
                </label>
              </div>
              <div id="cert-upload-wrap" style="display:none;margin-top:8px">
                <p style="font-size:12.5px;color:var(--text-muted);margin:0 0 8px">Upload your completion certificate (PDF, JPG, or PNG):</p>
                <input type="file" id="cert-file" accept=".pdf,.jpg,.jpeg,.png" style="width:100%;font-size:12px;cursor:pointer;padding:4px" onchange="onCertFileSelected(this)">
                <div id="cert-upload-status" style="font-size:12px;margin-top:6px;display:none"></div>
              </div>
            </div>

            <button class="btn btn-success" style="width:100%;justify-content:center" id="complete-btn" onclick="markComplete()" disabled>
              Mark as Complete ✓
            </button>
            <div id="completed-msg" style="display:none;text-align:center;padding:10px 0">
              <div style="color:var(--success);font-size:13px;font-weight:600">✓ Completed</div>
              <div id="completed-date" style="font-size:11.5px;color:var(--text-muted);margin-top:2px"></div>
            </div>
          </div>

          <!-- Certificate card (shown after completion) -->
          <div class="card card-body" id="cert-card" style="display:none">
            <div class="card-title">Certificate</div>
            <div style="margin-top:10px;font-size:13px;color:var(--text-muted)">
              You earned a certificate for this course.
            </div>
            <button class="btn btn-secondary btn-sm" style="margin-top:10px;width:100%;justify-content:center" onclick="downloadCertificate()">
              Download Certificate
            </button>
          </div>

          <!-- Course info -->
          <div class="card card-body" id="info-card">
            <div class="card-title">About this course</div>
            <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px;font-size:13px;color:var(--text-muted)" id="course-info-rows"></div>
          </div>

          <div class="card card-body" id="tags-card" style="display:none">
            <div class="card-title" style="margin-bottom:8px">Tags</div>
            <div id="tags-wrap" style="display:flex;flex-wrap:wrap;gap:6px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/app.js"></script>
<script>
document.getElementById('logo-letter').textContent = APP_CONFIG.logoLetter;
document.getElementById('app-name').textContent = APP_CONFIG.appName;

const params    = new URLSearchParams(location.search);
const courseId  = params.get('id');
let currentUser = null, enrollment = null, course = null;

// Tracking state
let trackTimer = null, trackSeconds = 0, trackMinSeconds = 0, trackUnlocked = false;

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;
  renderNav('catalog', currentUser);
  renderUserChip(currentUser);
  renderNotifBell(currentUser.id, 'notif-bell-wrap');

  if (!courseId) { location.href = 'catalog.html'; return; }
  course = await Courses.getById(courseId);
  if (!course) { location.href = 'catalog.html'; return; }

  document.title = course.title + ' — HonorVet LMS';
  document.getElementById('course-title').textContent = course.title;
  document.getElementById('ch-cat').textContent = (course.tags && course.tags[0]) || 'Training';
  document.getElementById('course-hero').style.background = courseGradient(course);
  document.getElementById('course-meta').innerHTML =
    `<span class="chm">${clockIcon()} ${course.duration_minutes || '?'} min</span>` +
    `<span class="chm">${course.icon || '📖'} ${contentTypeLabel(course.content_type)}</span>` +
    (course.is_mandatory ? `<span class="chm chm-mand">⚠ Mandatory</span>` : '');

  try { await Enrollments.enroll(currentUser.id, courseId); } catch {}

  const enrs = await Enrollments.getMine(currentUser.id);
  enrollment  = enrs.find(e => e.course_id === courseId);

  updateProgressUI();

  document.getElementById('course-info-rows').innerHTML = `
    <div><strong>Duration:</strong> ${course.duration_minutes || '?'} minutes</div>
    <div><strong>Type:</strong> ${contentTypeLabel(course.content_type)}</div>
    ${course.is_mandatory ? '<div style="color:var(--danger)"><strong>⚠ Mandatory training</strong></div>' : ''}
    ${course.created_at ? `<div><strong>Added:</strong> ${fmtDate(course.created_at)}</div>` : ''}
  `;

  if (course.tags?.length) {
    document.getElementById('tags-card').style.display = '';
    document.getElementById('tags-wrap').innerHTML = course.tags.map(t =>
      `<span class="badge badge-blue">${t}</span>`).join('');
  }

  await renderPlayer(course);

  if (enrollment?.status === 'not_started') {
    await Enrollments.updateProgress(currentUser.id, courseId, 'in_progress', 10);
    enrollment.status   = 'in_progress';
    enrollment.progress = 10;
    updateProgressUI();
  }

  // Start tracking only if not already completed
  if (enrollment?.status !== 'completed') {
    startTracking(course);
  }
})();

// ── Progress UI ────────────────────────────────────────────────
function updateProgressUI() {
  if (!enrollment) return;
  const fill = document.getElementById('progress-fill');
  fill.style.width = (enrollment.progress || 0) + '%';
  fill.classList.toggle('done', enrollment.status === 'completed');

  if (enrollment.status === 'completed') {
    document.getElementById('progress-label').textContent = `Completed on ${fmtDate(enrollment.completed_at)}`;
    document.getElementById('complete-btn').style.display = 'none';
    document.getElementById('completed-msg').style.display = '';
    document.getElementById('completed-date').textContent  = fmtDate(enrollment.completed_at);
    document.getElementById('tracking-gate').style.display = 'none';
    document.getElementById('cert-card').style.display = '';
  } else {
    document.getElementById('progress-label').textContent = enrollment.status === 'in_progress' ? 'In progress' : 'Not started';
  }
}

// ── Tracking logic ─────────────────────────────────────────────
function startTracking(course) {
  const type = course.content_type;
  document.getElementById('tracking-gate').style.display = '';

  if (type === 'youtube') {
    document.getElementById('tracking-msg').textContent = 'Watch the complete video to unlock completion.';
    // Player handles unlock via onYouTubeVideoEnded()
  } else if (type === 'link') {
    document.getElementById('tracking-msg').textContent = 'Complete the external course, then upload your certificate below to unlock completion.';
    document.getElementById('cert-upload-wrap').style.display = '';
  } else {
    // markdown / pdf — time gate
    trackMinSeconds = Math.min(600, Math.max(120, Math.floor((course.duration_minutes || 10) * 60 * 0.2)));
    document.getElementById('tracking-msg').textContent = 'Read the content to unlock completion.';
    document.getElementById('time-gate-wrap').style.display = '';
    updateTimeGateUI();
    trackTimer = setInterval(() => {
      trackSeconds = Math.min(trackSeconds + 1, trackMinSeconds);
      updateTimeGateUI();
      if (trackSeconds >= trackMinSeconds && !trackUnlocked) {
        clearInterval(trackTimer);
        unlockComplete();
      }
    }, 1000);
  }
}

function updateTimeGateUI() {
  const pct = trackMinSeconds > 0 ? Math.round(trackSeconds / trackMinSeconds * 100) : 0;
  const remaining = Math.max(0, trackMinSeconds - trackSeconds);
  const m = Math.floor(remaining / 60), s = remaining % 60;
  document.getElementById('time-bar').style.width = pct + '%';
  document.getElementById('time-label').textContent = remaining > 0
    ? `${m}m ${s < 10 ? '0' : ''}${s}s remaining`
    : '✓ Ready to complete!';
  // Update overall progress bar proportionally while reading
  if (enrollment && enrollment.status !== 'completed') {
    const readingProgress = 10 + Math.floor(pct * 0.85);
    document.getElementById('progress-fill').style.width = readingProgress + '%';
    document.getElementById('progress-label').textContent = 'Reading…';
  }
}

function unlockComplete() {
  trackUnlocked = true;
  clearInterval(trackTimer);
  document.getElementById('tracking-gate').style.display = 'none';
  document.getElementById('complete-btn').disabled = false;
  document.getElementById('progress-fill').style.width = '95%';
  document.getElementById('progress-label').textContent = 'Ready to mark complete';
  toast('Content viewed — you can now mark this course complete.', 'success');
}

function onAckChange() {
  if (document.getElementById('ack-checkbox').checked) unlockComplete();
  else {
    document.getElementById('complete-btn').disabled = true;
    document.getElementById('tracking-gate').style.display = '';
  }
}

function onYouTubeVideoEnded() {
  unlockComplete();
}

async function onCertFileSelected(input) {
  const file = input.files[0];
  if (!file) return;
  const status = document.getElementById('cert-upload-status');
  status.style.display = '';
  status.style.color = 'var(--text-muted)';
  status.textContent = 'Uploading certificate…';
  try {
    const ext = file.name.split('.').pop();
    const path = `${currentUser.id}/${courseId}_${Date.now()}.${ext}`;
    const { error } = await sb().storage.from('cert-uploads').upload(path, file, { upsert: true });
    if (error) throw error;
    status.style.color = 'var(--success)';
    status.textContent = '✓ Certificate uploaded successfully!';
    unlockComplete();
  } catch(e) {
    status.style.color = 'var(--danger)';
    status.textContent = 'Upload failed: ' + e.message;
    input.value = '';
  }
}

// ── Mark complete ──────────────────────────────────────────────
async function markComplete() {
  const btn = document.getElementById('complete-btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    enrollment = await Enrollments.updateProgress(currentUser.id, courseId, 'completed', 100);
    updateProgressUI();
    toast('Course completed! Certificate issued. 🎉', 'success');
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false; btn.textContent = 'Mark as Complete ✓';
  }
}

function downloadCertificate() {
  const firstName = (currentUser.name || currentUser.email).split(' ')[0];
  const date      = fmtDate(enrollment?.completed_at);
  const params    = new URLSearchParams({
    name:   firstName,
    course: course.title || '',
    date:   date || '',
    desc:   course.description
      ? `has successfully completed the <strong>${course.title}</strong> training program — ${course.description}`
      : '',
  });
  window.open(`certificate.html?${params.toString()}`, '_blank');
}

// ── Player ─────────────────────────────────────────────────────
async function renderPlayer(course) {
  const wrap = document.getElementById('player-wrap');

  if (course.content_type === 'youtube') {
    const videoId = extractYouTubeId(course.content_url);
    if (videoId) {
      wrap.innerHTML = `<div id="yt-player-div"></div>`;
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      document.head.appendChild(tag);
      window._ytVideoId = videoId;
      window.onYouTubeIframeAPIReady = () => {
        new YT.Player('yt-player-div', {
          videoId,
          width: '100%',
          height: '460',
          playerVars: { rel: 0, modestbranding: 1 },
          events: { onStateChange: e => { if (e.data === YT.PlayerState.ENDED) onYouTubeVideoEnded(); } }
        });
      };
      if (window.YT && window.YT.Player) window.onYouTubeIframeAPIReady();
      return;
    }
  }

  if (course.content_type === 'pdf') {
    wrap.innerHTML = `<iframe class="player-embed" src="${course.content_url}" style="height:600px"></iframe>`;
    return;
  }

  if (course.content_type === 'link') {
    wrap.innerHTML = `
      <div style="padding:40px;text-align:center">
        <div style="font-size:48px;margin-bottom:16px">🔗</div>
        <p style="font-size:15px;color:var(--text-muted);margin-bottom:20px">This course opens in an external resource.</p>
        <a href="${course.content_url}" target="_blank" rel="noopener" class="btn btn-primary btn-lg">Open Content ↗</a>
        <p style="margin-top:16px;font-size:12px;color:var(--text-dim)">${course.content_url}</p>
        <div style="margin-top:28px;padding:16px 20px;background:#fefce8;border:1px solid #fbbf24;border-radius:10px;text-align:left">
          <p style="margin:0;font-size:13.5px;color:#78350f;line-height:1.7">
            <strong>📋 Important:</strong> Once you complete this course on the external platform, please come back here and upload your completion certificate using the panel on the right. Your course will only be marked as complete after your certificate has been submitted.
          </p>
        </div>
      </div>`;
    return;
  }

  if (course.content_type === 'markdown' && course.content_url?.includes('github.com')) {
    wrap.innerHTML = `<div style="padding:24px;color:var(--text-muted);font-size:14px">Loading content from GitHub…</div>`;
    try {
      const md = await fetchGithubReadme(course.content_url);
      if (md) {
        wrap.innerHTML = `<div class="player-markdown" id="md-content">${markdownToHtml(md)}</div>`;
        return;
      }
    } catch {}
    wrap.innerHTML = `
      <div style="padding:40px;text-align:center">
        <div style="font-size:48px;margin-bottom:16px">📂</div>
        <p style="color:var(--text-muted);margin-bottom:20px">Could not load content automatically. Open the repository directly:</p>
        <a href="${course.content_url}" target="_blank" rel="noopener" class="btn btn-primary btn-lg">Open on GitHub ↗</a>
      </div>`;
    return;
  }

  wrap.innerHTML = `
    <div style="padding:40px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">${course.icon || '📖'}</div>
      <h3 style="margin-bottom:8px">${course.title}</h3>
      <p style="color:var(--text-muted);margin-bottom:20px">${course.description || ''}</p>
      ${course.content_url ? `<a href="${course.content_url}" target="_blank" rel="noopener" class="btn btn-primary btn-lg">Open Content ↗</a>` : ''}
    </div>`;
}

function extractYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

function contentTypeLabel(t) {
  return { markdown: 'GitHub Repo', pdf: 'PDF Document', youtube: 'Video', link: 'External Link' }[t] || t || 'Unknown';
}
</script>
</body>
</html>
